<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Sandbox - DeepInfra</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        header {
            background: #16213e;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #0f3460;
        }
        header h1 { font-size: 18px; color: #e94560; }
        .header-controls { display: flex; gap: 12px; align-items: center; }
        .header-controls label { font-size: 13px; color: #999; }
        .header-controls input, .header-controls select {
            background: #1a1a2e;
            border: 1px solid #0f3460;
            color: #e0e0e0;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 13px;
        }
        .header-controls select { min-width: 280px; }
        #api-key-input { width: 220px; }

        /* Main layout */
        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Left panel - System prompt */
        .left-panel {
            width: 360px;
            min-width: 300px;
            background: #16213e;
            border-right: 1px solid #0f3460;
            display: flex;
            flex-direction: column;
            padding: 16px;
            gap: 12px;
        }
        .left-panel h2 {
            font-size: 14px;
            color: #e94560;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .total-token-count {
            font-size: 11px;
            color: #666;
            font-weight: 400;
            text-transform: none;
            letter-spacing: 0;
        }
        .prompt-section { display: flex; flex-direction: column; gap: 4px; flex: 1; min-height: 0; }
        .prompt-section label {
            font-size: 11px;
            color: #e94560;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .token-count {
            color: #666;
            font-weight: 400;
            text-transform: none;
            letter-spacing: 0;
        }
        .prompt-section textarea {
            flex: 1;
            background: #1a1a2e;
            border: 1px solid #0f3460;
            color: #e0e0e0;
            padding: 10px;
            border-radius: 8px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 13px;
            line-height: 1.5;
            resize: none;
        }
        .prompt-section textarea:focus { outline: none; border-color: #e94560; }
        .prompt-sections { display: flex; flex-direction: column; gap: 10px; flex: 1; min-height: 0; }

        /* Parameters */
        .params {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .param-group { display: flex; flex-direction: column; gap: 4px; }
        .param-group label { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.5px; display: flex; justify-content: space-between; align-items: center; }
        .param-group input[type="range"] { width: 100%; accent-color: #e94560; }
        .param-input {
            width: 60px;
            background: #1a1a2e;
            border: 1px solid #0f3460;
            color: #e94560;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 12px;
            text-align: right;
            font-family: 'Consolas', 'Monaco', monospace;
        }
        .param-input:focus { outline: none; border-color: #e94560; }

        /* Saved prompts */
        .saved-prompts { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .saved-prompts select {
            flex: 1;
            background: #1a1a2e;
            border: 1px solid #0f3460;
            color: #e0e0e0;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 13px;
        }
        .btn-small {
            background: #0f3460;
            border: none;
            color: #e0e0e0;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }
        .btn-small:hover { background: #e94560; }

        /* Right panel - Chat */
        .right-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* Chat messages */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            font-size: 14px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .message.user {
            align-self: flex-end;
            background: #0f3460;
            border-bottom-right-radius: 4px;
        }
        .message.assistant {
            align-self: flex-start;
            background: #222244;
            border-bottom-left-radius: 4px;
        }
        .message .role-label {
            font-size: 11px;
            color: #e94560;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }
        .message.streaming { border-left: 3px solid #e94560; }

        /* Metadata shown under assistant messages */
        .msg-meta {
            font-size: 11px;
            color: #666;
            margin-top: 8px;
            padding-top: 6px;
            border-top: 1px solid #333;
        }

        /* Input area */
        .input-area {
            padding: 16px 20px;
            border-top: 1px solid #0f3460;
            display: flex;
            gap: 10px;
            background: #16213e;
        }
        #user-input {
            flex: 1;
            background: #1a1a2e;
            border: 1px solid #0f3460;
            color: #e0e0e0;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            resize: none;
            min-height: 48px;
            max-height: 150px;
        }
        #user-input:focus { outline: none; border-color: #e94560; }
        .btn {
            background: #e94560;
            border: none;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
        }
        .btn:hover { background: #c73652; }
        .btn:disabled { background: #555; cursor: not-allowed; }
        .btn-outline {
            background: transparent;
            border: 1px solid #0f3460;
            color: #999;
            padding: 12px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
        }
        .btn-outline:hover { border-color: #e94560; color: #e94560; }

        /* Empty state */
        .empty-state {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #444;
            font-size: 16px;
            text-align: center;
            line-height: 1.6;
        }

        /* Custom model input */
        .custom-model-row {
            display: none;
            gap: 8px;
            align-items: center;
        }
        .custom-model-row.visible { display: flex; }
        .custom-model-row input {
            background: #1a1a2e;
            border: 1px solid #0f3460;
            color: #e0e0e0;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 13px;
            width: 280px;
        }
    </style>
</head>
<body>

<header>
    <h1>LLM Sandbox</h1>
    <div class="header-controls">
        <label>API Key</label>
        <input type="password" id="api-key-input" placeholder="your DeepInfra key">
        <label>Model</label>
        <select id="model-select">
            <option value="deepseek-ai/DeepSeek-V3.2">DeepSeek V3.2</option>
            <option value="moonshotai/Kimi-K2.5">Kimi K2.5</option>
            <option value="meta-llama/Llama-3.3-70B-Instruct">Llama 3.3 70B</option>
            <option value="meta-llama/Meta-Llama-3.1-405B-Instruct">Llama 3.1 405B</option>
            <option value="meta-llama/Meta-Llama-3.1-70B-Instruct">Llama 3.1 70B</option>
            <option value="meta-llama/Meta-Llama-3.1-8B-Instruct">Llama 3.1 8B</option>
            <option value="deepseek-ai/DeepSeek-V3">DeepSeek V3</option>
            <option value="deepseek-ai/DeepSeek-R1">DeepSeek R1</option>
            <option value="Qwen/Qwen2.5-72B-Instruct">Qwen 2.5 72B</option>
            <option value="Qwen/QwQ-32B">QwQ 32B</option>
            <option value="mistralai/Mixtral-8x22B-Instruct-v0.1">Mixtral 8x22B</option>
            <option value="google/gemma-2-27b-it">Gemma 2 27B</option>
            <option value="microsoft/phi-4">Phi-4</option>
            <option value="__custom__">Custom model ID...</option>
        </select>
        <div class="custom-model-row" id="custom-model-row">
            <input type="text" id="custom-model-input" placeholder="e.g. org/model-name">
        </div>
    </div>
</header>

<div class="main">
    <!-- Left panel: system prompt + params -->
    <div class="left-panel">
        <h2>System Prompt <span class="total-token-count" id="total-token-count">Total: 0 tokens</span></h2>

        <div class="saved-prompts">
            <select id="saved-prompts-select">
                <option value="">-- saved prompts --</option>
            </select>
            <button class="btn-small" onclick="savePrompt()">Save</button>
            <button class="btn-small" onclick="deletePrompt()">Del</button>
        </div>

        <div class="prompt-sections">
            <div class="prompt-section">
                <label>1. Chat Norms <span class="token-count" id="token-count-1">0 tokens</span></label>
                <textarea id="system-prompt-1" placeholder="Rules for how the chat should work..."></textarea>
            </div>
            <div class="prompt-section">
                <label>2. World Data <span class="token-count" id="token-count-2">0 tokens</span></label>
                <textarea id="system-prompt-2" placeholder="Background info, facts, context..."></textarea>
            </div>
            <div class="prompt-section">
                <label>3. Character <span class="token-count" id="token-count-3">0 tokens</span></label>
                <textarea id="system-prompt-3" placeholder="Personality, voice, identity..."></textarea>
            </div>
        </div>

        <div class="params">
            <div class="param-group">
                <label>Temperature <input type="text" class="param-input" id="temp-val" value="0.7"></label>
                <input type="range" id="temperature" min="0" max="2" step="0.05" value="0.7">
            </div>
            <div class="param-group">
                <label>Output Tokens <input type="text" class="param-input" id="tokens-val" value="16384"></label>
                <input type="range" id="max-tokens" min="64" max="16384" step="64" value="16384">
            </div>
            <div class="param-group">
                <label>Input Tokens <input type="text" class="param-input" id="input-tokens-val" value="128000"></label>
                <input type="range" id="max-input-tokens" min="1000" max="128000" step="1000" value="128000">
            </div>
            <div class="param-group">
                <label>Top P <input type="text" class="param-input" id="topp-val" value="0.9"></label>
                <input type="range" id="top-p" min="0" max="1" step="0.05" value="0.9">
            </div>
            <div class="param-group">
                <label>Freq Penalty <input type="text" class="param-input" id="freq-val" value="0"></label>
                <input type="range" id="freq-penalty" min="0" max="2" step="0.1" value="0">
            </div>
        </div>
    </div>

    <!-- Right panel: chat -->
    <div class="right-panel">
        <div class="chat-area" id="chat-area">
            <div class="empty-state">
                Type a message to start testing your system prompt.<br>
                Messages stream in real-time.
            </div>
        </div>

        <div class="input-area">
            <textarea id="user-input" rows="1" placeholder="Type a message... (Enter to send, Shift+Enter for newline)"></textarea>
            <button class="btn" id="send-btn" onclick="sendMessage()">Send</button>
            <button class="btn-outline" onclick="clearChat()">Clear</button>
        </div>
    </div>
</div>

<script>
    // ---- State ----
    let conversationHistory = [];
    let isStreaming = false;
    let abortController = null;

    // ---- DOM refs ----
    const apiKeyInput = document.getElementById('api-key-input');
    const modelSelect = document.getElementById('model-select');
    const customModelRow = document.getElementById('custom-model-row');
    const customModelInput = document.getElementById('custom-model-input');
    const systemPrompt1 = document.getElementById('system-prompt-1');
    const systemPrompt2 = document.getElementById('system-prompt-2');
    const systemPrompt3 = document.getElementById('system-prompt-3');

    // Helper: combine the three prompt sections into one string
    function getSystemPrompt() {
        const parts = [systemPrompt1.value.trim(), systemPrompt2.value.trim(), systemPrompt3.value.trim()];
        return parts.filter(p => p).join('\n\n');
    }
    const chatArea = document.getElementById('chat-area');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const tempSlider = document.getElementById('temperature');
    const tokensSlider = document.getElementById('max-tokens');
    const topPSlider = document.getElementById('top-p');
    const freqSlider = document.getElementById('freq-penalty');
    const savedPromptsSelect = document.getElementById('saved-prompts-select');

    // ---- Persist API key in localStorage ----
    apiKeyInput.value = localStorage.getItem('deepinfra_api_key') || '';
    apiKeyInput.addEventListener('change', () => {
        localStorage.setItem('deepinfra_api_key', apiKeyInput.value);
    });

    // ---- Custom model toggle ----
    modelSelect.addEventListener('change', () => {
        customModelRow.classList.toggle('visible', modelSelect.value === '__custom__');
    });

    function getModel() {
        return modelSelect.value === '__custom__' ? customModelInput.value.trim() : modelSelect.value;
    }

    // ---- Sliders + text inputs (two-way sync) ----
    const inputTokensSlider = document.getElementById('max-input-tokens');

    function linkSliderAndInput(slider, input) {
        slider.addEventListener('input', () => { input.value = slider.value; });
        input.addEventListener('change', () => {
            let v = parseFloat(input.value);
            const min = parseFloat(slider.min), max = parseFloat(slider.max);
            if (isNaN(v)) v = parseFloat(slider.value);
            v = Math.max(min, Math.min(max, v));
            input.value = v;
            slider.value = v;
        });
    }

    linkSliderAndInput(tempSlider, document.getElementById('temp-val'));
    linkSliderAndInput(tokensSlider, document.getElementById('tokens-val'));
    linkSliderAndInput(inputTokensSlider, document.getElementById('input-tokens-val'));
    linkSliderAndInput(topPSlider, document.getElementById('topp-val'));
    linkSliderAndInput(freqSlider, document.getElementById('freq-val'));

    // ---- Saved prompts ----
    function getSavedPrompts() {
        return JSON.parse(localStorage.getItem('saved_prompts') || '{}');
    }

    function refreshSavedPrompts() {
        const prompts = getSavedPrompts();
        savedPromptsSelect.innerHTML = '<option value="">-- saved prompts --</option>';
        for (const name of Object.keys(prompts).sort()) {
            const opt = document.createElement('option');
            opt.value = name;
            opt.textContent = name;
            savedPromptsSelect.appendChild(opt);
        }
    }

    savedPromptsSelect.addEventListener('change', () => {
        const prompts = getSavedPrompts();
        if (savedPromptsSelect.value && prompts[savedPromptsSelect.value]) {
            const saved = prompts[savedPromptsSelect.value];
            systemPrompt1.value = saved.p1 || '';
            systemPrompt2.value = saved.p2 || '';
            systemPrompt3.value = saved.p3 || '';
            updateTokenCounts();
        }
    });

    function savePrompt() {
        const name = prompt('Name for this prompt:');
        if (!name) return;
        const prompts = getSavedPrompts();
        prompts[name] = { p1: systemPrompt1.value, p2: systemPrompt2.value, p3: systemPrompt3.value };
        localStorage.setItem('saved_prompts', JSON.stringify(prompts));
        refreshSavedPrompts();
        savedPromptsSelect.value = name;
    }

    function deletePrompt() {
        const name = savedPromptsSelect.value;
        if (!name) return;
        const prompts = getSavedPrompts();
        delete prompts[name];
        localStorage.setItem('saved_prompts', JSON.stringify(prompts));
        refreshSavedPrompts();
    }

    refreshSavedPrompts();

    // ---- Chat ----
    function addMessage(role, content, meta) {
        // Remove empty state on first message
        const empty = chatArea.querySelector('.empty-state');
        if (empty) empty.remove();

        const div = document.createElement('div');
        div.className = `message ${role}`;
        div.innerHTML = `<div class="role-label">${role}</div><div class="content"></div>`;
        div.querySelector('.content').textContent = content;

        if (meta) {
            const metaDiv = document.createElement('div');
            metaDiv.className = 'msg-meta';
            metaDiv.textContent = meta;
            div.appendChild(metaDiv);
        }

        chatArea.appendChild(div);
        chatArea.scrollTop = chatArea.scrollHeight;
        return div;
    }

    function clearChat() {
        conversationHistory = [];
        chatArea.innerHTML = '<div class="empty-state">Type a message to start testing your system prompt.<br>Messages stream in real-time.</div>';
    }

    async function sendMessage() {
        const apiKey = apiKeyInput.value.trim();
        if (!apiKey) { alert('Please enter your DeepInfra API key.'); apiKeyInput.focus(); return; }

        const model = getModel();
        if (!model) { alert('Please select or enter a model.'); return; }

        const text = userInput.value.trim();
        if (!text || isStreaming) return;

        // Add user message
        conversationHistory.push({ role: 'user', content: text });
        addMessage('user', text);
        userInput.value = '';
        userInput.style.height = 'auto';

        // Build messages array, trimming older messages if over input token limit
        const messages = [];
        const sysPrompt = getSystemPrompt();
        if (sysPrompt) {
            messages.push({ role: 'system', content: sysPrompt });
        }
        const maxInputTokens = parseInt(document.getElementById('input-tokens-val').value) || 128000;
        const sysTokens = sysPrompt ? estimateTokens(sysPrompt) : 0;
        let budget = maxInputTokens - sysTokens;
        // Add conversation messages newest-first until we run out of budget
        const trimmed = [];
        for (let i = conversationHistory.length - 1; i >= 0; i--) {
            const msgTokens = estimateTokens(conversationHistory[i].content);
            if (budget - msgTokens < 0 && trimmed.length > 0) break;
            budget -= msgTokens;
            trimmed.unshift(conversationHistory[i]);
        }
        messages.push(...trimmed);

        // UI state
        isStreaming = true;
        sendBtn.disabled = true;
        sendBtn.textContent = 'Stop';
        sendBtn.disabled = false;
        sendBtn.onclick = stopStreaming;

        const assistantDiv = addMessage('assistant', '');
        assistantDiv.classList.add('streaming');
        const contentEl = assistantDiv.querySelector('.content');

        // Call DeepInfra (OpenAI-compatible streaming)
        abortController = new AbortController();
        let fullResponse = '';
        const startTime = Date.now();

        try {
            const response = await fetch('https://api.deepinfra.com/v1/openai/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiKey}`
                },
                body: JSON.stringify({
                    model: model,
                    messages: messages,
                    temperature: parseFloat(tempSlider.value),
                    max_tokens: parseInt(tokensSlider.value),
                    top_p: parseFloat(topPSlider.value),
                    frequency_penalty: parseFloat(freqSlider.value),
                    stream: true
                }),
                signal: abortController.signal
            });

            if (!response.ok) {
                const errBody = await response.text();
                throw new Error(`API error ${response.status}: ${errBody}`);
            }

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop(); // keep incomplete line in buffer

                for (const line of lines) {
                    if (!line.startsWith('data: ')) continue;
                    const data = line.slice(6).trim();
                    if (data === '[DONE]') continue;

                    try {
                        const parsed = JSON.parse(data);
                        const delta = parsed.choices?.[0]?.delta?.content;
                        if (delta) {
                            fullResponse += delta;
                            contentEl.textContent = fullResponse;
                            chatArea.scrollTop = chatArea.scrollHeight;
                        }
                    } catch (e) {
                        // skip malformed chunks
                    }
                }
            }
        } catch (err) {
            if (err.name === 'AbortError') {
                fullResponse += '\n[stopped]';
                contentEl.textContent = fullResponse;
            } else {
                contentEl.textContent = `Error: ${err.message}`;
                contentEl.style.color = '#e94560';
            }
        }

        // Finalize
        const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
        assistantDiv.classList.remove('streaming');

        if (fullResponse && !fullResponse.includes('[stopped]')) {
            conversationHistory.push({ role: 'assistant', content: fullResponse });
            const metaDiv = document.createElement('div');
            metaDiv.className = 'msg-meta';
            metaDiv.textContent = `${model} | ${elapsed}s | temp ${tempSlider.value}`;
            assistantDiv.appendChild(metaDiv);
        }

        isStreaming = false;
        sendBtn.textContent = 'Send';
        sendBtn.onclick = sendMessage;
    }

    function stopStreaming() {
        if (abortController) abortController.abort();
    }

    // ---- Token counting (approx ~4 chars per token) ----
    function estimateTokens(text) {
        if (!text.trim()) return 0;
        return Math.ceil(text.length / 4);
    }

    function updateTokenCounts() {
        const t1 = estimateTokens(systemPrompt1.value);
        const t2 = estimateTokens(systemPrompt2.value);
        const t3 = estimateTokens(systemPrompt3.value);
        document.getElementById('token-count-1').textContent = t1 + ' tokens';
        document.getElementById('token-count-2').textContent = t2 + ' tokens';
        document.getElementById('token-count-3').textContent = t3 + ' tokens';
        document.getElementById('total-token-count').textContent = 'Total: ' + (t1 + t2 + t3) + ' tokens';
    }

    systemPrompt1.addEventListener('input', updateTokenCounts);
    systemPrompt2.addEventListener('input', updateTokenCounts);
    systemPrompt3.addEventListener('input', updateTokenCounts);

    // ---- Auto-resize input + Enter to send ----
    userInput.addEventListener('input', () => {
        userInput.style.height = 'auto';
        userInput.style.height = Math.min(userInput.scrollHeight, 150) + 'px';
    });

    userInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });
</script>

</body>
</html>
